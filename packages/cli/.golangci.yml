version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      # Ignore specific functions where error return is intentionally not checked
      exclude-functions:
        - (io.Writer).Write
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Print
        - fmt.Println
        - (*github.com/fatih/color.Color).Printf
        - (io.ReadCloser).Close
        - (*os.File).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - ineffassign
          - staticcheck
      - path: mock\.go
        linters:
          - errcheck
